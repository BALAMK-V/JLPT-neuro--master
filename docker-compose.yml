services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jlpt_neuro_master
      POSTGRES_USER: jlpt
      POSTGRES_PASSWORD: jlpt
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: "Gfi)S-_k0vpZa*ve%x2V#s3z$1R_CvNyKiduWGmCm9Zw&0(R&958VzaNipD-"
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      DATABASE_URL: "postgres://jlpt:jlpt@db:5432/jlpt_neuro_master"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5174,http://localhost:5174"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:5174,http://localhost:5174"
      USE_S3: "0"
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: "http://localhost:8001/api"
    ports:
      - "127.0.0.1:5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
